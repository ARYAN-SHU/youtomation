{% extends 'base.html' %}

{% block title %}Videos - Youtomation{% endblock %}

{% block content %}
<div class="space-y-6" x-data="videosPage()" x-cloak>
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Videos</h1>
            <p class="text-gray-600 mt-1">Manage and monitor your generated YouTube videos</p>
        </div>
    </div>

    <!-- Filters and Search -->
    <div class="bg-white rounded-lg shadow-md p-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <!-- Search -->
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                <input
                    type="text"
                    placeholder="Search by title, topic, or ID..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition"
                    @input="searchQuery = $event.target.value; applyFilters()"
                >
            </div>

            <!-- Status Filter -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                <select
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition"
                    @change="statusFilter = $event.target.value; applyFilters()"
                >
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="generating_script">Generating Script</option>
                    <option value="generating_audio">Generating Audio</option>
                    <option value="generating_video">Generating Video</option>
                    <option value="uploading">Uploading</option>
                    <option value="published">Published</option>
                    <option value="failed">Failed</option>
                </select>
            </div>

            <!-- Sort -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Sort By</label>
                <select
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition"
                    @change="sortBy = $event.target.value; applyFilters()"
                >
                    <option value="-created_at">Newest First</option>
                    <option value="created_at">Oldest First</option>
                    <option value="-youtube_views">Most Views</option>
                    <option value="title">Title (A-Z)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Videos Table -->
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Title</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Created</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Duration</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Views</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <template x-for="video in videos" :key="video.id">
                        <tr class="hover:bg-gray-50 transition" x-cloak>
                            <td class="px-6 py-4">
                                <div class="max-w-xs">
                                    <a :href="`/videos/${video.id}/`" class="text-red-600 hover:text-red-700 font-medium hover:underline">
                                        <span x-text="video.title"></span>
                                    </a>
                                    <p class="text-sm text-gray-500 mt-1" x-text="`Topic: ${video.trending_topic || 'N/A'}`"></p>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span
                                    class="px-3 py-1 rounded-full text-xs font-semibold"
                                    :class="getStatusClass(video.status)"
                                    x-text="video.status"
                                ></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600" x-text="formatDate(video.created_at)"></td>
                            <td class="px-6 py-4 text-sm text-gray-600" x-text="video.duration_formatted || '-'"></td>
                            <td class="px-6 py-4 text-sm text-gray-600" x-text="formatNumber(video.youtube_views)"></td>
                            <td class="px-6 py-4 text-sm">
                                <div class="flex gap-2">
                                    <a :href="`/videos/${video.id}/`" class="text-red-600 hover:text-red-700 font-medium">View</a>
                                    <template x-if="video.youtube_url">
                                        <a :href="video.youtube_url" target="_blank" class="text-blue-600 hover:text-blue-700 font-medium">YouTube</a>
                                    </template>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <template x-if="videos.length === 0">
            <div class="px-6 py-12 text-center">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">No videos found</h3>
                <p class="mt-1 text-sm text-gray-500">Start generating videos to see them appear here.</p>
            </div>
        </template>
    </div>

    <!-- Pagination -->
    <template x-if="totalPages > 1">
        <div class="flex justify-center gap-2">
            <button
                @click="previousPage()"
                :disabled="currentPage === 1"
                class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition"
            >
                Previous
            </button>
            <span class="px-4 py-2 text-gray-700" x-text="`Page ${currentPage} of ${totalPages}`"></span>
            <button
                @click="nextPage()"
                :disabled="currentPage === totalPages"
                class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition"
            >
                Next
            </button>
        </div>
    </template>
</div>

<script>
function videosPage() {
    return {
        videos: [],
        searchQuery: '',
        statusFilter: '',
        sortBy: '-created_at',
        currentPage: 1,
        totalPages: 1,
        isLoading: false,

        init() {
            this.loadVideos();
            setInterval(() => this.loadVideos(), 30000); // Refresh every 30 seconds
        },

        loadVideos() {
            this.isLoading = true;
            const params = new URLSearchParams({
                q: this.searchQuery,
                status: this.statusFilter,
                sort: this.sortBy,
                page: this.currentPage,
            });

            fetch(`/api/videos/?${params}`)
                .then(r => r.json())
                .then(data => {
                    this.videos = data.results || [];
                    this.totalPages = Math.ceil((data.count || 0) / data.page_size);
                })
                .catch(err => console.error('Error loading videos:', err))
                .finally(() => this.isLoading = false);
        },

        applyFilters() {
            this.currentPage = 1;
            this.loadVideos();
        },

        previousPage() {
            if (this.currentPage > 1) {
                this.currentPage--;
                this.loadVideos();
            }
        },

        nextPage() {
            if (this.currentPage < this.totalPages) {
                this.currentPage++;
                this.loadVideos();
            }
        },

        getStatusClass(status) {
            const classes = {
                'published': 'bg-green-100 text-green-800',
                'failed': 'bg-red-100 text-red-800',
                'uploading': 'bg-yellow-100 text-yellow-800',
                'generating_video': 'bg-blue-100 text-blue-800',
                'generating_audio': 'bg-blue-100 text-blue-800',
                'generating_script': 'bg-blue-100 text-blue-800',
                'pending': 'bg-gray-100 text-gray-800',
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        },

        formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
            });
        },

        formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num || 0);
        }
    }
}
</script>
{% endblock %}
