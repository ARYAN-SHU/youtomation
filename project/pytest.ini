[pytest]
DJANGO_SETTINGS_MODULE = youtomation_core.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=youtomation_app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
    -ra

testpaths = tests

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_api: marks tests as requiring API keys
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    views: marks tests related to views
    services: marks tests related to services
    auth: marks tests related to authentication
    tasks: marks tests related to Celery tasks

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
